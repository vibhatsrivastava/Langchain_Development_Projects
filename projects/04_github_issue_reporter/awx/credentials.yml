---
# Custom AWX Credential Types for 04_github_issue_reporter
# Import these definitions in AWX UI → Settings → Credential Types

# ═══════════════════════════════════════════════════════════════════════════
# 1. Ollama API Credentials
# ═══════════════════════════════════════════════════════════════════════════
- name: Ollama API Credentials
  description: Configuration for Ollama LLM server
  kind: cloud
  inputs:
    fields:
      - id: ollama_base_url
        type: string
        label: Ollama Base URL
        help_text: "URL of the Ollama server (e.g., http://localhost:11434)"
        default: "http://localhost:11434"
      - id: ollama_api_key
        type: string
        label: Ollama API Key
        help_text: "Bearer token for remote Ollama servers (leave empty for local/unauthenticated)"
        secret: true
      - id: ollama_model
        type: string
        label: Default Model
        help_text: "Default LLM model to use (e.g., gpt-oss:20b, llama3.1:8b)"
        default: "gpt-oss:20b"
    required:
      - ollama_base_url
      - ollama_model
  injectors:
    env:
      OLLAMA_BASE_URL: "{{ ollama_base_url }}"
      OLLAMA_API_KEY: "{{ ollama_api_key }}"
      OLLAMA_MODEL: "{{ ollama_model }}"

# ═══════════════════════════════════════════════════════════════════════════
# 2. Langfuse Observability Credentials (Optional)
# ═══════════════════════════════════════════════════════════════════════════
- name: Langfuse Observability Credentials
  description: Configuration for Langfuse LLM tracing and observability
  kind: cloud
  inputs:
    fields:
      - id: langfuse_enabled
        type: string
        label: Enable Tracing
        help_text: "Set to 'true' to enable Langfuse tracing (default: true)"
        default: "true"
      - id: langfuse_public_key
        type: string
        label: Langfuse Public Key
        help_text: "Public API key from Langfuse dashboard (Settings → API Keys)"
      - id: langfuse_secret_key
        type: string
        label: Langfuse Secret Key
        help_text: "Secret API key from Langfuse dashboard"
        secret: true
      - id: langfuse_host
        type: string
        label: Langfuse Host
        help_text: "Langfuse server URL (cloud or self-hosted, e.g., http://10.0.0.15:3000)"
    required: []
  injectors:
    env:
      LANGFUSE_ENABLED: "{{ langfuse_enabled }}"
      LANGFUSE_PUBLIC_KEY: "{{ langfuse_public_key }}"
      LANGFUSE_SECRET_KEY: "{{ langfuse_secret_key }}"
      LANGFUSE_HOST: "{{ langfuse_host }}"

# ═══════════════════════════════════════════════════════════════════════════
# 3. GitHub API Credentials
# ═══════════════════════════════════════════════════════════════════════════
- name: GitHub API Credentials
  description: GitHub Personal Access Token and repository configuration for issue reporting
  kind: cloud
  inputs:
    fields:
      - id: github_token
        type: string
        label: GitHub Personal Access Token
        help_text: "Token with 'repo' scope for read/write access (create at https://github.com/settings/tokens)"
        secret: true
      - id: github_repo_owner
        type: string
        label: Repository Owner
        help_text: "GitHub username or organization (e.g., vibhatsrivastava)"
      - id: github_repo_name
        type: string
        label: Repository Name
        help_text: "Repository name to analyze (e.g., Agentic_AI_Development_Framework)"
    required:
      - github_token
      - github_repo_owner
      - github_repo_name
  injectors:
    env:
      GITHUB_TOKEN: "{{ github_token }}"
      GITHUB_REPO_OWNER: "{{ github_repo_owner }}"
      GITHUB_REPO_NAME: "{{ github_repo_name }}"
