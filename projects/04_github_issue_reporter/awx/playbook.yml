---
# Ansible playbook for 04_github_issue_reporter agent
# Generated by AI Agent Builder CLI with AWX integration
# Project: 04_github_issue_reporter (langgraph architecture)

- name: Execute 04_github_issue_reporter AI Agent
  hosts: localhost
  gather_facts: false
  
  vars:
    project_dir: "{{ playbook_dir }}/.."
    venv_path: "{{ project_dir }}/.venv"
    python_executable: "{{ venv_path }}/Scripts/python.exe"  # Windows
    # For Linux/Mac, use: "{{ venv_path }}/bin/python"
    
  tasks:
    - name: Verify project virtual environment exists
      ansible.builtin.stat:
        path: "{{ venv_path }}"
      register: venv_stat
      
    - name: Fail if venv not found
      ansible.builtin.fail:
        msg: "Virtual environment not found at {{ venv_path }}. Run setup first."
      when: not venv_stat.stat.exists
    
    - name: Set agent execution environment variables
      ansible.builtin.set_fact:
        agent_env:
          # Ollama configuration (from AWX credentials)
          OLLAMA_BASE_URL: "{{ ollama_base_url }}"
          OLLAMA_API_KEY: "{{ ollama_api_key | default('') }}"
          OLLAMA_MODEL: "{{ ollama_model }}"
          
          # Langfuse observability (from AWX credentials, optional)
          LANGFUSE_ENABLED: "{{ langfuse_enabled | default('true') }}"
          LANGFUSE_PUBLIC_KEY: "{{ langfuse_public_key | default('') }}"
          LANGFUSE_SECRET_KEY: "{{ langfuse_secret_key | default('') }}"
          LANGFUSE_HOST: "{{ langfuse_host | default('') }}"
          
          # GitHub API configuration (from AWX credentials)
          GITHUB_TOKEN: "{{ github_token }}"
          GITHUB_REPO_OWNER: "{{ github_repo_owner }}"
          GITHUB_REPO_NAME: "{{ github_repo_name }}"
          
          # Agent execution parameters (from AWX survey)
          MODE: "{{ mode }}"
          ISSUE_NUMBER: "{{ issue_number | default('') }}"
          DRY_RUN: "{{ dry_run | default('false') }}"
          MAX_ISSUES: "{{ max_issues | default('100') }}"
          
          # Logging configuration
          LOG_LEVEL: "{{ log_level | default('INFO') }}"
          
          # AWX job tracking
          AWX_JOB_ID: "{{ tower_job_id | default('') }}"
    
    - name: Execute GitHub Issue Reporter agent via AWX wrapper
      ansible.builtin.command:
        cmd: "{{ python_executable }} -m common.awx_wrapper 04_github_issue_reporter"
        chdir: "{{ playbook_dir }}/../../.."  # Repository root
      environment: "{{ agent_env }}"
      register: agent_output
      changed_when: false
      failed_when: agent_output.rc != 0
    
    - name: Parse agent output as JSON
      ansible.builtin.set_fact:
        agent_result: "{{ agent_output.stdout | from_json }}"
      when: agent_output.stdout | length > 0
    
    - name: Display agent execution result
      ansible.builtin.debug:
        msg: |
          Status: {{ agent_result.status }}
          Result: {{ agent_result.result | default('No result') }}
          Execution Time: {{ agent_result.metadata.execution_time }}s
          AWX Job ID: {{ agent_result.metadata.awx_job_id }}
      when: agent_result is defined
    
    - name: Fail if agent execution failed
      ansible.builtin.fail:
        msg: "Agent execution failed: {{ agent_result.error }}"
      when: agent_result is defined and agent_result.status == "error"
