[pytest]
# ─── Test Discovery ──────────────────────────────────────────
testpaths = common projects
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# ─── Coverage Configuration ──────────────────────────────────
# Minimum coverage threshold: 75% (realistic for AI agent testing)
addopts = 
    --strict-markers
    -v

# ─── Custom Test Markers ─────────────────────────────────────
markers =
    unit: Unit tests (fast, isolated functions/methods)
    integration: Integration tests with real LLMs (skip in CI, run manually)
    smoke: Quick smoke tests for essential functionality

# ─── Coverage Scope ──────────────────────────────────────────
# Measure coverage for production code only
[coverage:run]
source = common,projects
omit =
    */tests/*
    */__pycache__/*
    */site-packages/*
    */.venv/*
    */venv/*
    */planner/*
    */Quick-Reference/*
    */docs/*

[coverage:report]
# Fail if coverage below 75% (realistic threshold for mocked AI testing)
fail_under = 75
precision = 1
show_missing = True
skip_covered = False
exclude_lines =
    # Exclude standard patterns from coverage
    pragma: no cover
    def __repr__
    def __str__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
    @abc.abstractmethod

[coverage:html]
directory = htmlcov
title = Agentic_AI_Development_Framework Test Coverage Report

# ─── Markers ─────────────────────────────────────────────────
markers =
    unit: Unit tests (isolated, fast, mocked dependencies)
    integration: Integration tests (multi-component, may use real chains)
    slow: Tests that take >1 second to run
    llm: Tests that involve LLM interactions (should be mocked)
    requires_env: Tests that require specific environment variables
