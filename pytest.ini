[pytest]
# ─── Test Discovery ──────────────────────────────────────────
testpaths = common projects
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# ─── Coverage Configuration ──────────────────────────────────
# Minimum coverage threshold: 90%
addopts = 
    --strict-markers
    -v

# ─── Coverage Scope ──────────────────────────────────────────
# Measure coverage for production code only
[coverage:run]
source = common,projects
omit =
    */tests/*
    */__pycache__/*
    */site-packages/*
    */.venv/*
    */venv/*
    */Playground/*
    */Quick-Reference/*
    */docs/*

[coverage:report]
# Fail if coverage below 90%
fail_under = 90
precision = 1
show_missing = True
skip_covered = False
exclude_lines =
    # Exclude standard patterns from coverage
    pragma: no cover
    def __repr__
    def __str__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
    @abc.abstractmethod

[coverage:html]
directory = htmlcov
title = Langchain_Development_Projects Test Coverage Report

# ─── Markers ─────────────────────────────────────────────────
markers =
    unit: Unit tests (isolated, fast, mocked dependencies)
    integration: Integration tests (multi-component, may use real chains)
    slow: Tests that take >1 second to run
    llm: Tests that involve LLM interactions (should be mocked)
    requires_env: Tests that require specific environment variables
